<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Glowing green crosshair background -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00ff88" stroke-width="4" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="50" y1="0" x2="50" y2="100" stroke="#00ff88" stroke-width="2" />
  <line x1="0" y1="50" x2="100" y2="50" stroke="#00ff88" stroke-width="2" />

  <!-- Neon blue battleship center -->
  <rect x="35" y="45" width="30" height="10" fill="#00e5ff" rx="2" />
  <rect x="42" y="35" width="16" height="10" fill="#00e5ff" />
  <rect x="47" y="25" width="6" height="10" fill="#00e5ff" />
</svg>
